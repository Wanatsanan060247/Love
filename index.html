<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>กดตรงนี้สิ</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

button{
padding:20px 40px;
font-size:30px;
border:none;
border-radius:15px;
background:#ff4081;
color:white;
cursor:pointer;
}

#msg{
display:none;
font-size:80px;
margin-top:20px;
animation:bounce 0.5s infinite alternate;
}

@keyframes bounce{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

.laugh{
position:fixed;
bottom:-50px;
font-size:40px;
animation:float 4s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>

</head>

<body>

<div>

<h1>กดตรงนี้สิ 😏</h1>

<button onclick="start()">กดเลย</button>

<div id="msg">อีแก่ 🤣🤣🤣</div>

</div>

<script>

function start(){

document.getElementById("msg").style.display="block";

setInterval(createLaugh,200);

}

function createLaugh(){

const e=document.createElement("div");

e.classList.add("laugh");

e.innerHTML="🤣";

e.style.left=Math.random()*100+"vw";

e.style.fontSize=(30+Math.random()*40)+"px";

document.body.appendChild(e);

setTimeout(()=>{e.remove()},4000);

}

</script>

</body>
</html>
